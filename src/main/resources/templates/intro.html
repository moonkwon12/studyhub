<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StudyHub 소개</title>
    <style>
        body { margin: 0; font-family: "Segoe UI", "Noto Sans KR", sans-serif; background: #f3f6fb; color: #1d2433; }
        .wrap { max-width: 800px; margin: 72px auto; padding: 20px; text-align: center; }
        h1 { font-size: 34px; margin: 0 0 12px; }
        p { color: #4e5d73; }
        .btns { margin-top: 22px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        a { text-decoration: none; padding: 11px 16px; border-radius: 10px; font-weight: 600; }
        .primary { background: #0f6dff; color: #fff; }
        .ghost { background: #fff; color: #1d2433; border: 1px solid #d7dfea; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>StudyHub</h1>
    <p>스터디 생성, 멤버 관리, 게시글 작성까지 한 번에 관리하는 학습 커뮤니티 플랫폼입니다.</p>
    <div class="btns">
        <a class="primary" href="/auth">로그인 / 회원가입</a>
        <a class="ghost" href="/main">메인 페이지</a>
    </div>
</div>
</body>
</html>
